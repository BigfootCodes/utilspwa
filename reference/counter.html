<body class="bg-background text-on-background font-body-md antialiased min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Ambient background effect -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-20" style="background: radial-gradient(circle at 50% 50%, var(--tw-colors-secondary-container) 0%, transparent 70%);"></div>
<!-- Main Container -->
<main class="w-full max-w-md mx-auto h-screen flex flex-col justify-between px-margin-page py-stack-xl relative z-10">
<!-- Header -->
<header class="flex items-center justify-center pt-stack-sm pb-stack-lg w-full fixed top-0 left-0 right-0 z-50 bg-white/70 backdrop-blur-xl border-b border-black/[0.05] shadow-[0_4px_20px_rgba(0,0,0,0.03)] px-6 py-4">
<!-- Placeholder for Leading Icon if needed later -->
<div class="w-8"></div>
<h1 class="font-h1 text-h1 text-primary-container text-center flex-1">Counter</h1>
<!-- Placeholder for Trailing Avatar if needed later -->
<div class="w-8"></div>
</header>
<!-- Spacer for fixed header -->
<div class="h-24"></div>
<!-- Readout Area -->
<section class="flex-1 flex flex-col items-center justify-center mt-stack-xl relative">
<div class="bg-surface-container-highest/30 backdrop-blur-3xl border border-outline-variant/30 rounded-[3rem] p-8 w-full aspect-square flex flex-col items-center justify-center shadow-[0_10px_40px_rgba(0,0,0,0.05)] relative overflow-hidden group">
<!-- Subtle internal reflection -->
<div class="absolute top-0 left-0 w-full h-1/2 bg-gradient-to-b from-white/20 to-transparent pointer-events-none rounded-t-[3rem]"></div>
<!-- The Number -->
<div class="font-display text-[120px] leading-[1] font-bold text-primary tracking-tighter select-none tabular-nums z-10 transition-transform duration-300 transform group-active:scale-95">
                    1,204
                </div>
<!-- Subtle Label below number -->
<div class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest mt-4 opacity-70">
                    Current Count
                </div>
</div>
</section>
<!-- Controls Area -->
<section class="mt-stack-xl pb-stack-md flex flex-col gap-stack-lg w-full items-center">
<!-- Primary Actions (+ / -) -->
<div class="flex items-center justify-center gap-stack-md w-full max-w-[320px]">
<!-- Minus Button -->
<button class="w-20 h-20 rounded-full bg-surface-container border border-outline-variant/50 shadow-[0_4px_20px_rgba(0,0,0,0.03)] flex items-center justify-center text-primary hover:bg-surface-variant active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined text-[32px]">remove</span>
</button>
<!-- Plus Button (Emphasized) -->
<button class="w-24 h-24 rounded-full bg-primary-container text-on-primary shadow-[0_8px_30px_rgba(13,44,46,0.3)] flex items-center justify-center hover:opacity-90 active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined text-[40px]">add</span>
</button>
</div>
<!-- Secondary Action (Reset) -->
<button class="flex items-center gap-2 px-6 py-3 rounded-full border border-outline/30 text-on-surface-variant hover:bg-surface-variant/50 active:scale-95 transition-all duration-200 mt-stack-md font-button text-button">
<span class="material-symbols-outlined text-[20px]">refresh</span>
                Reset Counter
            </button>
</section>
</main>
